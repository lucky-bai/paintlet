# Deploys the static landing page in site/ to GitHub Pages. The page is plain
# HTML/CSS with no build step, so we upload the folder as-is. Runs on pushes to
# main that touch the site (or this workflow), plus manual dispatch.
#
# One-time setup after merging: Settings → Pages → Build and deployment →
# Source: "GitHub Actions".
name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
