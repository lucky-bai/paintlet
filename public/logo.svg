<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Paintlet">
  <defs>
    <linearGradient id="pl-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#acd8e6"/>
      <stop offset="1" stop-color="#79b3c7"/>
    </linearGradient>
    <linearGradient id="pl-pal" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#e2be88"/>
      <stop offset="1" stop-color="#c1955d"/>
    </linearGradient>
    <linearGradient id="pl-wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#caa06a"/>
      <stop offset="0.5" stop-color="#a9713a"/>
      <stop offset="1" stop-color="#7f4620"/>
    </linearGradient>
    <linearGradient id="pl-metal" x1="0" y1="-1" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef2f5"/>
      <stop offset="0.5" stop-color="#c2cbd3"/>
      <stop offset="1" stop-color="#95a2ad"/>
    </linearGradient>
    <linearGradient id="pl-bristle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5763f"/>
      <stop offset="1" stop-color="#7d5027"/>
    </linearGradient>
  </defs>

  <!-- Rounded tile -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#pl-tile)"/>

  <!-- Palette (with a real thumb-hole, punched via the even-odd rule) + wells,
       tilted slightly for a natural look. -->
  <g transform="rotate(-8 236 288)">
    <!-- soft ground shadow -->
    <ellipse cx="242" cy="312" rx="176" ry="140" fill="#000000" opacity="0.12"/>
    <path fill="url(#pl-pal)" stroke="#5c4630" stroke-width="9" fill-rule="evenodd"
      d="M64 288 a172 136 0 1 0 344 0 a172 136 0 1 0 -344 0 Z
         M270 352 a36 28 0 1 0 72 0 a36 28 0 1 0 -72 0 Z"/>
    <!-- top sheen -->
    <path fill="#ffffff" opacity="0.16"
      d="M96 236 a150 92 0 0 1 288 -34 a150 118 0 0 0 -288 34 Z"/>

    <!-- paint wells -->
    <circle cx="258" cy="212" r="28" fill="#e0473b" stroke="#00000026" stroke-width="3"/>
    <ellipse cx="250" cy="203" rx="9" ry="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="182" cy="196" r="26" fill="#f0902f" stroke="#00000026" stroke-width="3"/>
    <ellipse cx="175" cy="188" rx="8" ry="5" fill="#ffffff" opacity="0.4"/>
    <circle cx="120" cy="244" r="26" fill="#f4c53a" stroke="#00000026" stroke-width="3"/>
    <ellipse cx="113" cy="236" rx="8" ry="5" fill="#ffffff" opacity="0.4"/>
    <circle cx="116" cy="320" r="27" fill="#4fa64e" stroke="#00000026" stroke-width="3"/>
    <ellipse cx="108" cy="311" rx="9" ry="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="166" cy="384" r="27" fill="#3f78c3" stroke="#00000026" stroke-width="3"/>
    <ellipse cx="158" cy="375" rx="9" ry="6" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Paintbrush laid diagonally across the palette. Built horizontally
       (bristle tip at the local origin) then rotated into place. -->
  <g transform="translate(198 334) rotate(-42)" stroke="#3a2618" stroke-width="4"
     stroke-linejoin="round" stroke-linecap="round">
    <!-- bristles -->
    <path fill="url(#pl-bristle)"
      d="M0 0 C 24 -22 56 -22 82 -16 C 88 -6 88 6 82 16 C 56 22 24 22 0 0 Z"/>
    <g stroke="#5f3f22" stroke-width="1.6" opacity="0.6">
      <path fill="none" d="M74 -9 C 46 -6 20 -3 6 -1"/>
      <path fill="none" d="M76 0 L 5 0"/>
      <path fill="none" d="M74 9 C 46 6 20 3 6 1"/>
    </g>
    <!-- ferrule -->
    <rect x="80" y="-20" width="30" height="40" rx="5" fill="url(#pl-metal)"/>
    <path fill="none" stroke="#7f8a94" stroke-width="2" d="M90 -18 L 90 18 M100 -18 L 100 18"/>
    <!-- handle -->
    <path fill="url(#pl-wood)"
      d="M106 -19 L 252 -13 Q 302 -8 302 0 Q 302 8 252 13 L 106 19 Z"/>
    <path fill="none" stroke="#e6ad72" stroke-width="3" opacity="0.55"
      d="M116 -12 Q 240 -7 292 -2"/>
  </g>
</svg>
